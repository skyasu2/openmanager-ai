# GitLab CI/CD Pipeline
# 정책:
#   - validate: branch / MR / main 코드 변경 시 실행
#   - deploy, smoke: main 코드 변경 시만 실행 (docs/reports 전용 push 스킵)
# 구조: validate → deploy → smoke (순차, validate 실패 시 deploy 차단)
# Runner 전략:
#   validate: tags: [wsl2-docker] → self-hosted runner (분 소진 0)
#             WSL2 runner 미가동 시 job은 pending 상태로 남음
#             shared runner 우회가 필요하면 validate tags를 수동으로 제거해야 함
#   deploy:   tags 없음 → shared runner (~4분/회)
#   smoke:    tags 없음 → shared runner (~30초/회)
# 분 소진 예산: validate 0분 + deploy ~4분 + smoke ~0.5분 = ~5분/회 (self-hosted 가동 시)
#             validate를 수동으로 shared runner로 전환하면 ~8분/회 수준까지 증가 가능

image: node:24-bookworm

# ─── 파이프라인 레벨 제어 ──────────────────────────────────────────────────────
# job-level rules:changes 와 달리 파이프라인 자체 생성을 차단 → UI 노이즈 제거
# duplicate pipeline 방지:
#   - MR이 열려 있으면 branch push pipeline 대신 MR pipeline만 유지
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH'
    - when: never

stages:
  - validate
  - deploy
  - smoke

# ─── 공통 캐시 ────────────────────────────────────────────────────────────────
# .npm/ 만 캐시 (node_modules/ 제외)
# 이유: node_modules/는 500MB~1GB로 캐시 upload/download가 npm ci보다 느릴 수 있음
#       .npm/ 은 npm HTTP 캐시 (~50~200MB). --cache .npm 으로 npm ci 속도 2~4배 향상
.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push   # validate가 작성 → deploy가 재사용

.npm_cache_readonly: &npm_cache_readonly
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull        # deploy: 읽기 전용 재사용

# ─── 변경 감지 규칙 ────────────────────────────────────────────────────────────
# docs/reports/QA 아티팩트 전용 push는 CI 스킵 → 분 소진 방지
.validate_code_changes: &validate_code_changes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - src/**/*
        - cloud-run/**/*
        - public/**/*
        - scripts/**/*
        - config/**/*
        - package.json
        - package-lock.json
        - next.config.mjs
        - tsconfig.json
        - vercel.json
        - .env.example
        - .gitlab-ci.yml
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**/*
        - cloud-run/**/*
        - public/**/*
        - scripts/**/*
        - config/**/*
        - package.json
        - package-lock.json
        - next.config.mjs
        - tsconfig.json
        - vercel.json
        - .env.example
        - .gitlab-ci.yml
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes:
        - src/**/*
        - cloud-run/**/*
        - public/**/*
        - scripts/**/*
        - config/**/*
        - package.json
        - package-lock.json
        - next.config.mjs
        - tsconfig.json
        - vercel.json
        - .env.example
        - .gitlab-ci.yml
      when: on_success
    - when: never

.main_code_changes_only: &main_code_changes_only
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**/*
        - cloud-run/**/*
        - public/**/*
        - scripts/**/*
        - config/**/*
        - package.json
        - package-lock.json
        - next.config.mjs
        - tsconfig.json
        - vercel.json
        - .env.example
        - .gitlab-ci.yml
      when: on_success
    - when: never

# ─── validate job ──────────────────────────────────────────────────────────────
validate:
  stage: validate
  tags:
    - wsl2-docker  # self-hosted runner 전용 (분 소진 0). 미가동 시 pending 상태 유지.
  <<: [*npm_cache, *validate_code_changes]
  before_script:
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "▶ TypeScript 타입 검사..."
    - npm run type-check
    - echo "▶ Biome lint 검사..."
    - npm run lint:ci
    - echo "▶ 빠른 테스트 실행..."
    - npm run test:quick
    - echo "✅ validate 통과"
  timeout: 15 minutes
  interruptible: true

# ─── deploy job ────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  <<: [*npm_cache_readonly, *main_code_changes_only]  # validate가 작성한 .npm/ 캐시 재사용 → npm ci 속도 향상
  before_script:
    - npm install -g vercel@50 --no-audit --silent  # 버전 고정: 50.x (breaking change 방지)
  script:
    - echo "▶ Vercel production 배포..."
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
    - echo "✅ 배포 완료"
  environment:
    name: production
    url: https://openmanager-ai.vercel.app
  resource_group: production  # production deploy 동시 실행 방지
  timeout: 10 minutes
  # validate 성공 시에만 실행 (GitLab이 stage 순서로 자동 보장)

# ─── production smoke job ──────────────────────────────────────────────────────
post_deploy_smoke:
  stage: smoke
  <<: *main_code_changes_only
  needs:
    - deploy
  script:
    - echo "▶ Production post-deploy smoke..."
    - npm run test:vercel:post-deploy:smoke -- --url=https://openmanager-ai.vercel.app
    - echo "✅ post-deploy smoke 통과"
  timeout: 5 minutes
  interruptible: true
