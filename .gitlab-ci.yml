# GitLab CI/CD Pipeline
# 정책: main 브랜치 코드 변경 시만 실행 (docs/reports 전용 push 스킵)
# 구조: validate → deploy (순차, validate 실패 시 deploy 차단)
# Runner 전략:
#   validate: tags: [wsl2-docker] → self-hosted runner (분 소진 0)
#             WSL2 runner 미가동 시 shared runner 자동 폴백 (tags 미일치 → pending 후 shared)
#   deploy:   tags 없음 → shared runner (~4분/회)
# 분 소진 예산: validate 0분 + deploy ~4분 = ~4분/회 (self-hosted 가동 시)
#             validate ~3분 + deploy ~4분 = ~7분/회 (shared 폴백 시)

image: node:24-bookworm

stages:
  - validate
  - deploy

# ─── 공통 캐시 ────────────────────────────────────────────────────────────────
# validate가 pull-push로 캐시를 작성하고, deploy는 pull로 재사용
.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push   # validate가 작성 → deploy가 재사용

.node_cache_readonly: &node_cache_readonly
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull        # deploy: 읽기 전용 재사용

# ─── 변경 감지 규칙 ────────────────────────────────────────────────────────────
# docs/reports/QA 아티팩트 전용 push는 CI 스킵 → 분 소진 방지
.code_changes_only: &code_changes_only
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**/*
        - cloud-run/**/*
        - public/**/*
        - scripts/**/*
        - config/**/*
        - package.json
        - package-lock.json
        - next.config.mjs
        - tsconfig.json
        - vercel.json
        - .env.example
        - .gitlab-ci.yml
      when: on_success
    - when: never

# ─── validate job ──────────────────────────────────────────────────────────────
validate:
  stage: validate
  tags:
    - wsl2-docker  # self-hosted runner 우선 (분 소진 0). 미가동 시 pending 상태 유지.
  <<: *node_cache
  <<: *code_changes_only
  before_script:
    - npm ci --prefer-offline --no-audit
  script:
    - echo "▶ TypeScript 타입 검사..."
    - npm run type-check
    - echo "▶ Biome lint 검사..."
    - npm run lint:ci
    - echo "▶ 빠른 테스트 실행..."
    - npm run test:quick
    - echo "✅ validate 통과"
  timeout: 15 minutes
  interruptible: true

# ─── deploy job ────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  <<: *node_cache_readonly  # validate가 작성한 node_modules 재사용 → vercel build 속도 향상
  <<: *code_changes_only
  before_script:
    - npm install -g vercel@latest --no-audit --silent
    - npm ci --prefer-offline --no-audit  # 캐시 히트 시 수초, 미스 시 전체 설치 (fallback)
  script:
    - echo "▶ Vercel production 배포..."
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
    - echo "✅ 배포 완료"
  environment:
    name: production
    url: https://openmanager-ai.vercel.app
  timeout: 10 minutes
  # validate 성공 시에만 실행 (GitLab이 stage 순서로 자동 보장)
