# GitLab CI/CD Pipeline
# 정책:
#   - validate(frontend): branch / MR / main 프론트엔드/공용 코드 변경 시 실행
#   - validate(ai-engine): branch / MR / main AI Engine 변경 시 실행
#   - deploy(frontend): semver tag(v*.*.*) push 시 실행
#   - deploy_ai(ai-engine): semver tag(v*.*.*) push 시 실행
#   - smoke(frontend/ai-engine): 각 배포 경로 후 최소 smoke 수행
# 구조: validate(frontend + ai-engine) → deploy(frontend) / deploy_ai(ai-engine) → smoke(frontend + ai-engine)
# Runner 전략:
#   모든 job: tags: [wsl2-docker] → self-hosted shell executor (분 소진 0)
#   executor = "shell": Docker 불필요, WSL2에 설치된 node/npm/vercel/gcloud 직접 사용
#   개발이 WSL2에서 진행되므로 runner는 99% 가동 중.
#   runner 미가동 시: job은 pending 상태 유지 (Docker executor 시절 fail과 달리 안전하게 대기)
#   runner 미가동 대응: runner 복구 후 pending/tag pipeline을 재확인
# 분 소진 예산: 모든 job 자체 runner → 월 0분 소진 (GitLab shared runner 미사용)

# image: node:24-bookworm  ← shell executor에서는 무시됨. WSL2 시스템 Node 사용 (현재 v24)

# ─── 변경 감지 경로 앵커 ──────────────────────────────────────────────────────
.pipeline_relevant_changes: &pipeline_relevant_changes
  - src/**/*
  - public/**/*
  - config/**/*
  - supabase/migrations/**/*
  - supabase/seeds/**/*
  - supabase/config.toml
  - package.json
  - package-lock.json
  - biome.json
  - next.config.mjs
  - tsconfig.json
  - vercel.json
  - .env.example
  - cloud-run/ai-engine/**/*
  - scripts/deploy/**/*
  - scripts/git/**/*
  - scripts/gitlab/**/*
  - scripts/hooks/**/*
  - scripts/qa/**/*
  - scripts/release/**/*
  - scripts/ai/check-ai-sdk-registry.sh
  - scripts/sync/**/*
  - scripts/test/**/*
  - scripts/ci/ai-engine-post-deploy-smoke.sh
  - tests/**/*
  - playwright.config*.ts
  - .gitlab-ci.yml

.frontend_validate_paths: &frontend_validate_paths
  - src/**/*
  - public/**/*
  - config/**/*
  - supabase/migrations/**/*
  - supabase/seeds/**/*
  - supabase/config.toml
  - package.json
  - package-lock.json
  - biome.json
  - next.config.mjs
  - tsconfig.json
  - vercel.json
  - .env.example
  - scripts/deploy/**/*
  - scripts/git/**/*
  - scripts/gitlab/**/*
  - scripts/hooks/**/*
  - scripts/qa/**/*
  - scripts/release/**/*
  - scripts/sync/**/*
  - scripts/test/**/*
  - tests/**/*
  - playwright.config*.ts
  - .gitlab-ci.yml

.storybook_validate_paths: &storybook_validate_paths
  - .storybook/**/*
  - scripts/storybook/**/*
  - config/testing/vitest.config.storybook.ts
  - src/**/*.stories.ts
  - src/**/*.stories.tsx
  - src/components/**/*
  - src/app/**/*
  - package.json
  - package-lock.json
  - .gitlab-ci.yml

.bundle_budget_paths: &bundle_budget_paths
  - src/**/*
  - public/**/*
  - config/performance/bundlemon.config.cjs
  - package.json
  - package-lock.json
  - next.config.mjs
  - tsconfig.json
  - .gitlab-ci.yml

.ai_sdk_registry_paths: &ai_sdk_registry_paths
  - package.json
  - package-lock.json
  - cloud-run/ai-engine/package.json
  - cloud-run/ai-engine/package-lock.json
  - scripts/ai/check-ai-sdk-registry.sh
  - .gitlab-ci.yml

.frontend_deploy_paths: &frontend_deploy_paths
  - src/**/*
  - public/**/*
  - config/**/*
  - package.json
  - package-lock.json
  - next.config.mjs
  - tsconfig.json
  - vercel.json
  - .env.example

.ai_engine_validate_paths: &ai_engine_validate_paths
  - cloud-run/ai-engine/**/*
  - .gitlab-ci.yml

.ai_engine_smoke_paths: &ai_engine_smoke_paths
  - cloud-run/ai-engine/**/*
  - scripts/ci/ai-engine-post-deploy-smoke.sh
  - .gitlab-ci.yml

# ─── 파이프라인 레벨 제어 ──────────────────────────────────────────────────────
# job-level rules:changes 와 달리 파이프라인 자체 생성을 차단 → UI 노이즈 제거
# duplicate pipeline 방지:
#   - MR이 열려 있으면 branch push pipeline 대신 MR pipeline만 유지
# CI skip 2-layer 전략:
#   Layer 1 (commit-type): docs/reports/release-metadata 전용 커밋 타입 → 파이프라인 미생성 (명시적, 빠름)
#   Layer 2 (path-filter): 변경 경로가 pipeline_relevant_changes 에 없으면 미생성 (정확, 보완)
workflow:
  rules:
    # semver 태그 push → deploy 파이프라인 (validate + deploy + smoke)
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    # 운영 관측/수동 점검 파이프라인은 변경 감지와 무관하게 생성 허용
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    # Layer 1: docs/reports/QA 전용 커밋 타입 → 파이프라인 생성 차단
    # test(qa): QA 산출물 기록 / docs: 문서 전용 / docs(scope): 스코프 포함 문서
    # 주의: 해당 커밋이 src/** 를 건드리면 아래 path-filter가 실행되어야 하므로
    #        tag/schedule/web 규칙 다음에 위치시켜 우선순위 충돌 방지
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE =~ /^(test\(qa\)|docs(\([^)]+\))?):[[:space:]]/'
      when: never
    # Release commit은 package/changelog/status 버전 메타데이터만 담고,
    # 같은 push의 semver tag pipeline이 deploy/smoke 권위를 가진다.
    # 1인 개발 + AI 반복 릴리즈에서 main validate와 tag deploy가 self-hosted
    # runner 한 대를 두고 경합하지 않도록 branch pipeline을 생략한다.
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE =~ /^chore\(release\):[[:space:]]/'
      when: never
    # MR / branch push → validate 전용 파이프라인
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *pipeline_relevant_changes
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"'
      when: never
    # Layer 2: path-filter (최종 보루 — 변경 경로에 관련 파일 없으면 미생성)
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *pipeline_relevant_changes
    - if: '$CI_COMMIT_BRANCH'
      changes: *pipeline_relevant_changes
    - when: never

stages:
  - validate
  - deploy
  - deploy_ai
  - smoke

# ─── 공통 캐시 ────────────────────────────────────────────────────────────────
# .npm/ 만 캐시 (node_modules/ 제외)
# 이유: node_modules/는 500MB~1GB로 캐시 upload/download가 npm ci보다 느릴 수 있음
#       .npm/ 은 npm HTTP 캐시 (~50~200MB). --cache .npm 으로 npm ci 속도 2~4배 향상
.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push   # validate가 작성 → deploy가 재사용

.npm_cache_readonly: &npm_cache_readonly
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull        # deploy: 읽기 전용 재사용

# ─── 변경 감지 규칙 ────────────────────────────────────────────────────────────
# docs/reports/QA 아티팩트 전용 push는 CI 스킵 → 분 소진 방지
.frontend_validate_changes: &frontend_validate_changes
  rules:
    # QA 기록 커밋은 보고서/증거 동기화 목적이므로 프론트엔드 validate를 생략한다.
    - if: '$CI_COMMIT_MESSAGE =~ /^test\(qa\):/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *frontend_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *frontend_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *frontend_validate_paths
      when: on_success
    - when: never

.ai_engine_validate_changes: &ai_engine_validate_changes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *ai_engine_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *ai_engine_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *ai_engine_validate_paths
      when: on_success
    - when: never

.storybook_validate_changes: &storybook_validate_changes
  rules:
    # QA 기록 커밋은 Storybook smoke 생략
    - if: '$CI_COMMIT_MESSAGE =~ /^test\(qa\):/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *storybook_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *storybook_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *storybook_validate_paths
      when: on_success
    - when: never

.bundle_budget_changes: &bundle_budget_changes
  rules:
    # QA 기록 커밋은 번들 예산 관측을 생략한다.
    - if: '$CI_COMMIT_MESSAGE =~ /^test\(qa\):/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *bundle_budget_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *bundle_budget_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *bundle_budget_paths
      when: on_success
    - when: never

.ai_sdk_registry_changes: &ai_sdk_registry_changes
  rules:
    # QA 기록 커밋은 의존성 변경을 포함하지 않으므로 생략한다.
    - if: '$CI_COMMIT_MESSAGE =~ /^test\(qa\):/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *ai_sdk_registry_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *ai_sdk_registry_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *ai_sdk_registry_paths
      when: on_success
    - when: never

# deploy는 semver 태그(v*.*.*) push 시에만 실행한다.
# 이유: 릴리스 케이던스(30커밋 or 1주)를 CI가 강제 보장하고,
#       매 커밋 배포로 인한 runner 부하와 불필요한 Vercel 빌드를 방지한다.
# 트리거: git push gitlab --follow-tags  (npm run release:patch/minor/major 후)
.tag_deploy_rule: &tag_deploy_rule
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
    - when: never

.main_frontend_changes_only: &main_frontend_changes_only
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
    - when: never

.main_ai_engine_changes_only: &main_ai_engine_changes_only
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
    - when: never

.main_ai_engine_smoke_changes_only: &main_ai_engine_smoke_changes_only
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
    - when: never

.artifact_registry_cleanup_observe_rule: &artifact_registry_cleanup_observe_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never

.ai_engine_npm_cache: &ai_engine_npm_cache
  cache:
    key:
      files:
        - cloud-run/ai-engine/package-lock.json
    paths:
      - cloud-run/ai-engine/.npm/
    policy: pull-push

.gcp_ci_auth: &gcp_ci_auth
  - |
    if [ -z "${GCP_SERVICE_KEY:-}" ]; then
      echo "❌ Missing required GitLab CI variable: GCP_SERVICE_KEY"
      echo "   Add the base64-encoded service account JSON in GitLab → Settings → CI/CD → Variables."
      echo "   If this is a semver tag pipeline, protect the tag pattern (for example: v*.*.*)"
      echo "   so protected variables are exposed to the release tag as well."
      exit 1
    fi
    if [ -z "${GCP_PROJECT_ID:-}" ]; then
      echo "❌ Missing required GitLab CI variable: GCP_PROJECT_ID"
      echo "   Set it to the target GCP project id before running deploy_ai_engine."
      exit 1
    fi
  - printf '%s' "$GCP_SERVICE_KEY" | base64 -d > gcp-key.json
  - test -s gcp-key.json || (echo "❌ Decoded gcp-key.json is empty. Verify GCP_SERVICE_KEY is valid base64 JSON." && exit 1)
  - gcloud auth activate-service-account --key-file=gcp-key.json
  - gcloud config set project "$GCP_PROJECT_ID"

# ─── validate job ──────────────────────────────────────────────────────────────
validate:
  stage: validate
  tags:
    - wsl2-docker  # self-hosted runner 전용 (분 소진 0). 미가동 시 pending 상태 유지.
  <<: [*npm_cache, *frontend_validate_changes]
  before_script:
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "▶ TypeScript 타입 검사..."
    - npm run type-check
    - echo "▶ Biome lint 검사..."
    - npm run lint:ci
    - echo "▶ 빠른 테스트 실행..."
    - npm run test:quick
    - echo "▶ API/AI 로컬 계약 테스트 실행..."
    - npm run test:contract
    - echo "▶ Frontend 컴포넌트 의존도 맵 동기화 검증..."
    - npm run docs:components:verify
    - echo "✅ validate 통과"
  timeout: 15 minutes
  interruptible: true

validate_ai_engine:
  stage: validate
  tags:
    - wsl2-docker
  <<: [*ai_engine_npm_cache, *ai_engine_validate_changes]
  before_script:
    - cd cloud-run/ai-engine
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "▶ AI Engine TypeScript 타입 검사..."
    - npm run type-check
    - echo "▶ AI Engine 테스트 실행..."
    - npm run test
    - echo "✅ AI Engine validate 통과"
  timeout: 20 minutes
  interruptible: true

validate_ai_sdk_registry:
  stage: validate
  tags:
    - wsl2-docker
  <<: [*npm_cache, *ai_sdk_registry_changes]
  before_script:
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "▶ AI SDK registry/lockfile guard..."
    - npm run check:ai-sdk
    - echo "✅ AI SDK registry guard 통과"
  timeout: 5 minutes
  interruptible: true

validate_storybook_smoke:
  stage: validate
  tags:
    - wsl2-docker
  <<: [*npm_cache, *storybook_validate_changes]
  before_script:
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "▶ Storybook smoke 검사 (index/import/config drift 탐지)..."
    - npm run storybook:smoke
    - echo "✅ Storybook smoke 통과"
  timeout: 8 minutes
  interruptible: true

validate_bundle_budget:
  stage: validate
  tags:
    - wsl2-docker
  <<: [*npm_cache, *bundle_budget_changes]
  allow_failure: true
  before_script:
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "▶ Bundle size budget 관측 (warn-first, non-blocking)..."
    - |
      if [ -z "${BUNDLEMON_PROJECT_ID:-}" ]; then
        echo "⚪ BUNDLEMON_PROJECT_ID가 없어 bundlemon 업로드를 건너뜁니다."
        echo "   build:ci만 실행해 production bundle 생성 가능 여부를 확인합니다."
        npm run build:ci
        exit 0
      fi
    - npm run bundle:budget
    - echo "✅ Bundle size budget 관측 완료"
  timeout: 15 minutes
  interruptible: true

# ─── deploy job ────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  tags:
    - wsl2-docker  # self-hosted runner (분 소진 0). 미가동 시 pending 상태 유지.
  <<: [*npm_cache_readonly, *main_frontend_changes_only]  # validate가 작성한 .npm/ 캐시 재사용 → npm ci 속도 향상
  before_script:
    - |
      if [ -z "${VERCEL_TOKEN:-}" ]; then
        echo "❌ Missing required GitLab CI variable: VERCEL_TOKEN"
        echo "   Add it in GitLab → Settings → CI/CD → Variables before running deploy."
        echo "   If this is a semver tag pipeline, protect the tag pattern (for example: v*.*.*)"
        echo "   so protected variables are exposed to the release tag as well."
        exit 1
      fi
    - |
      if command -v vercel >/dev/null 2>&1 && vercel --version 2>/dev/null | grep -q "^50\."; then
        echo "✅ vercel 50.x already installed: $(vercel --version)"
      else
        npm install -g vercel@50 --no-audit --silent  # 버전 고정: 50.x (breaking change 방지)
      fi
  script:
    - echo "▶ Vercel production 배포..."
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - |
      export APP_COMMIT_SHA="${CI_COMMIT_SHA:-}"
      export APP_RELEASE_TAG="${CI_COMMIT_TAG:-}"
      export APP_PIPELINE_URL="${CI_PIPELINE_URL:-}"
      export NEXT_PUBLIC_APP_VERSION="${CI_COMMIT_TAG#v}"
      vercel build --prod --token=$VERCEL_TOKEN
    - |
      set +e
      timeout 300s vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN \
        --env "APP_COMMIT_SHA=${CI_COMMIT_SHA:-}" \
        --env "APP_RELEASE_TAG=${CI_COMMIT_TAG:-}" \
        --env "APP_PIPELINE_URL=${CI_PIPELINE_URL:-}" \
        --meta "gitCommitSha=${CI_COMMIT_SHA:-}" \
        --meta "gitCommitRef=${CI_COMMIT_TAG:-}" \
        --meta "gitPipelineUrl=${CI_PIPELINE_URL:-}"
      deploy_status=$?
      set -e
      if [ "$deploy_status" -eq 124 ]; then
        echo "⚠️ Vercel CLI timed out after the production deploy step; verifying the alias before failing."
        npm run test:vercel:post-deploy:smoke -- \
          --url=https://openmanager-ai.vercel.app \
          --expected-version="${CI_COMMIT_TAG#v}" \
          --expected-commit-sha="${CI_COMMIT_SHA}" \
          --retries=12 \
          --retry-delay-ms=10000
      elif [ "$deploy_status" -ne 0 ]; then
        exit "$deploy_status"
      fi
    - echo "✅ 배포 완료"
  environment:
    name: production
    url: https://openmanager-ai.vercel.app
  resource_group: production  # production deploy 동시 실행 방지
  timeout: 10 minutes
  # validate 성공 시에만 실행 (GitLab이 stage 순서로 자동 보장)

deploy_ai_engine:
  stage: deploy_ai
  tags:
    - wsl2-docker  # self-hosted runner (분 소진 0). 미가동 시 pending 상태 유지.
  <<: *main_ai_engine_changes_only
  # image: google/cloud-sdk:slim  ← shell executor에서는 무시됨. WSL2 시스템 gcloud 사용 (현재 548.0.0)
  script:
    - |
      decision_output="$(bash scripts/ci/should-deploy-ai-engine.sh)"
      echo "$decision_output"
      if printf '%s\n' "$decision_output" | grep -q '^decision=skip'; then
        echo "⚪ AI Engine Cloud Run 배포 스킵: 변경 없음"
        exit 0
      fi
    - |
      if [ -z "${GCP_SERVICE_KEY:-}" ]; then
        echo "❌ Missing required GitLab CI variable: GCP_SERVICE_KEY"
        echo "   Add the base64-encoded service account JSON in GitLab → Settings → CI/CD → Variables."
        echo "   If this is a semver tag pipeline, protect the tag pattern (for example: v*.*.*)"
        echo "   so protected variables are exposed to the release tag as well."
        exit 1
      fi
      if [ -z "${GCP_PROJECT_ID:-}" ]; then
        echo "❌ Missing required GitLab CI variable: GCP_PROJECT_ID"
        echo "   Set it to the target GCP project id before running deploy_ai_engine."
        exit 1
      fi
    - printf '%s' "$GCP_SERVICE_KEY" | base64 -d > gcp-key.json
    - test -s gcp-key.json || (echo "❌ Decoded gcp-key.json is empty. Verify GCP_SERVICE_KEY is valid base64 JSON." && exit 1)
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - echo "▶ AI Engine Cloud Run 배포..."
    - cd cloud-run/ai-engine
    - LOCAL_DOCKER_PREFLIGHT=false CLEANUP_ENABLED=true CLEANUP_KEEP_IMAGES=3 CLEANUP_KEEP_SOURCES=5 CLEANUP_KEEP_REVISIONS=3 bash deploy.sh
    - echo "✅ AI Engine 배포 완료"
  after_script:
    - rm -f gcp-key.json
  resource_group: ai-engine-production
  timeout: 15 minutes
  # validate_ai_engine 성공 시에만 실행

post_deploy_ai_engine_smoke:
  stage: smoke
  tags:
    - wsl2-docker  # self-hosted runner (분 소진 0). 미가동 시 pending 상태 유지.
  <<: *main_ai_engine_smoke_changes_only
  # image: google/cloud-sdk:slim  ← shell executor에서는 무시됨. WSL2 시스템 gcloud 사용
  needs:
    - job: deploy_ai_engine
      optional: true
  script:
    - |
      decision_output="$(bash scripts/ci/should-deploy-ai-engine.sh)"
      echo "$decision_output"
      if printf '%s\n' "$decision_output" | grep -q '^decision=skip'; then
        echo "⚪ AI Engine post-deploy smoke 스킵: 변경 없음"
        exit 0
      fi
    - |
      if [ -z "${GCP_SERVICE_KEY:-}" ]; then
        echo "❌ Missing required GitLab CI variable: GCP_SERVICE_KEY"
        echo "   Add the base64-encoded service account JSON in GitLab → Settings → CI/CD → Variables."
        echo "   If this is a semver tag pipeline, protect the tag pattern (for example: v*.*.*)"
        echo "   so protected variables are exposed to the release tag as well."
        exit 1
      fi
      if [ -z "${GCP_PROJECT_ID:-}" ]; then
        echo "❌ Missing required GitLab CI variable: GCP_PROJECT_ID"
        echo "   Set it to the target GCP project id before running deploy_ai_engine."
        exit 1
      fi
    - printf '%s' "$GCP_SERVICE_KEY" | base64 -d > gcp-key.json
    - test -s gcp-key.json || (echo "❌ Decoded gcp-key.json is empty. Verify GCP_SERVICE_KEY is valid base64 JSON." && exit 1)
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - echo "▶ AI Engine post-deploy smoke..."
    - |
      AI_ENGINE_EXPECTED_VERSION="$(node -p "require('./cloud-run/ai-engine/package.json').version")" \
        bash scripts/ci/ai-engine-post-deploy-smoke.sh
    - echo "✅ AI Engine post-deploy smoke 통과"
  after_script:
    - rm -f gcp-key.json
  timeout: 5 minutes
  interruptible: true

# ─── production smoke job ──────────────────────────────────────────────────────
post_deploy_smoke:
  stage: smoke
  tags:
    - wsl2-docker  # self-hosted runner (분 소진 0). 미가동 시 pending 상태 유지.
  <<: *main_frontend_changes_only
  needs:
    - deploy
  script:
    - echo "▶ Production post-deploy smoke..."
    - npm run test:vercel:post-deploy:smoke -- --url=https://openmanager-ai.vercel.app --expected-version="${CI_COMMIT_TAG#v}" --expected-commit-sha="${CI_COMMIT_SHA}"
    - echo "✅ post-deploy smoke 통과"
  timeout: 5 minutes
  interruptible: true

observe_artifact_registry_cleanup:
  stage: smoke
  tags:
    - wsl2-docker
  <<: *artifact_registry_cleanup_observe_rule
  before_script: *gcp_ci_auth
  script:
    - echo "▶ Artifact Registry cleanup recheck..."
    - mkdir -p tmp/ci
    - bash cloud-run/ai-engine/scripts/check-artifact-registry-cleanup.sh | tee tmp/ci/artifact-registry-cleanup-recheck.txt
    - echo "✅ Artifact Registry cleanup recheck 완료"
  artifacts:
    name: "artifact-registry-cleanup-${CI_PIPELINE_ID}"
    when: always
    expire_in: 14 days
    paths:
      - tmp/ci/artifact-registry-cleanup-recheck.txt
  after_script:
    - rm -f gcp-key.json
  timeout: 10 minutes
  interruptible: true
