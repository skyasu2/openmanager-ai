# GitLab CI/CD Pipeline
# м •мұ…:
#   - validate(frontend): branch / MR / main н”„лЎ нҠём—”л“ң/кіөмҡ© мҪ”л“ң ліҖкІҪ мӢң мӢӨн–ү
#   - validate(ai-engine): branch / MR / main AI Engine ліҖкІҪ мӢң мӢӨн–ү
#   - deploy(frontend): main н”„лЎ нҠём—”л“ң мҪ”л“ң ліҖкІҪ мӢң мӢӨн–ү
#   - deploy_ai(ai-engine): main AI Engine ліҖкІҪ мӢң мӢӨн–ү
#   - smoke(frontend/ai-engine): к°Ғ л°°нҸ¬ кІҪлЎң нӣ„ мөңмҶҢ smoke мҲҳн–ү
# кө¬мЎ°: validate(frontend + ai-engine) вҶ’ deploy(frontend) / deploy_ai(ai-engine) вҶ’ smoke(frontend + ai-engine)
# Runner м „лһө:
#   лӘЁл“  job: tags: [wsl2-docker] вҶ’ self-hosted shell executor (л¶„ мҶҢм§„ 0)
#   executor = "shell": Docker л¶Ҳн•„мҡ”, WSL2м—җ м„Өм№ҳлҗң node/npm/vercel/gcloud м§Ғм ‘ мӮ¬мҡ©
#   к°ңл°ңмқҙ WSL2м—җм„ң м§„н–үлҗҳлҜҖлЎң runnerлҠ” 99% к°ҖлҸҷ мӨ‘.
#   runner лҜёк°ҖлҸҷ мӢң: jobмқҖ pending мғҒнғң мң м§Җ (Docker executor мӢңм Ҳ failкіј лӢ¬лҰ¬ м•Ҳм „н•ҳкІҢ лҢҖкё°)
#   кёҙкёү л°°нҸ¬(runner лҜёк°ҖлҸҷ): vercel --prod м§Ғм ‘ мӢӨн–ү лҳҗлҠ” tags мһ„мӢң м ңкұ°
# л¶„ мҶҢм§„ мҳҲмӮ°: лӘЁл“  job мһҗмІҙ runner вҶ’ мӣ” 0л¶„ мҶҢм§„ (GitLab shared runner лҜёмӮ¬мҡ©)

# image: node:24-bookworm  вҶҗ shell executorм—җм„ңлҠ” л¬ҙмӢңлҗЁ. WSL2 мӢңмҠӨн…ң Node мӮ¬мҡ© (нҳ„мһ¬ v24)

# в”Җв”Җв”Җ ліҖкІҪ к°җм§Җ кІҪлЎң м•өм»Ө в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
.pipeline_relevant_changes: &pipeline_relevant_changes
  - src/**/*
  - public/**/*
  - config/**/*
  - package.json
  - package-lock.json
  - next.config.mjs
  - tsconfig.json
  - vercel.json
  - .env.example
  - cloud-run/ai-engine/**/*
  - scripts/deploy/**/*
  - scripts/git/**/*
  - scripts/gitlab/**/*
  - scripts/hooks/**/*
  - scripts/release/**/*
  - scripts/sync/**/*
  - scripts/test/**/*
  - scripts/ci/ai-engine-post-deploy-smoke.sh
  - .gitlab-ci.yml

.frontend_validate_paths: &frontend_validate_paths
  - src/**/*
  - public/**/*
  - config/**/*
  - package.json
  - package-lock.json
  - next.config.mjs
  - tsconfig.json
  - vercel.json
  - .env.example
  - scripts/deploy/**/*
  - scripts/git/**/*
  - scripts/gitlab/**/*
  - scripts/hooks/**/*
  - scripts/release/**/*
  - scripts/sync/**/*
  - scripts/test/**/*
  - .gitlab-ci.yml

.frontend_deploy_paths: &frontend_deploy_paths
  - src/**/*
  - public/**/*
  - config/**/*
  - package.json
  - package-lock.json
  - next.config.mjs
  - tsconfig.json
  - vercel.json
  - .env.example

.ai_engine_validate_paths: &ai_engine_validate_paths
  - cloud-run/ai-engine/**/*
  - .gitlab-ci.yml

.ai_engine_smoke_paths: &ai_engine_smoke_paths
  - cloud-run/ai-engine/**/*
  - scripts/ci/ai-engine-post-deploy-smoke.sh
  - .gitlab-ci.yml

# в”Җв”Җв”Җ нҢҢмқҙн”„лқјмқё л ҲлІЁ м ңм–ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# job-level rules:changes мҷҖ лӢ¬лҰ¬ нҢҢмқҙн”„лқјмқё мһҗмІҙ мғқм„ұмқ„ м°ЁлӢЁ вҶ’ UI л…ёмқҙмҰҲ м ңкұ°
# duplicate pipeline л°©м§Җ:
#   - MRмқҙ м—ҙл Ө мһҲмңјл©ҙ branch push pipeline лҢҖмӢ  MR pipelineл§Ң мң м§Җ
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *pipeline_relevant_changes
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *pipeline_relevant_changes
    - if: '$CI_COMMIT_BRANCH'
      changes: *pipeline_relevant_changes
    - when: never

stages:
  - validate
  - deploy
  - deploy_ai
  - smoke

# в”Җв”Җв”Җ кіөнҶө мәҗмӢң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# .npm/ л§Ң мәҗмӢң (node_modules/ м ңмҷё)
# мқҙмң : node_modules/лҠ” 500MB~1GBлЎң мәҗмӢң upload/downloadк°Җ npm ciліҙлӢӨ лҠҗлҰҙ мҲҳ мһҲмқҢ
#       .npm/ мқҖ npm HTTP мәҗмӢң (~50~200MB). --cache .npm мңјлЎң npm ci мҶҚлҸ„ 2~4л°° н–ҘмғҒ
.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push   # validateк°Җ мһ‘м„ұ вҶ’ deployк°Җ мһ¬мӮ¬мҡ©

.npm_cache_readonly: &npm_cache_readonly
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull        # deploy: мқҪкё° м „мҡ© мһ¬мӮ¬мҡ©

# в”Җв”Җв”Җ ліҖкІҪ к°җм§Җ к·ңм№ҷ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# docs/reports/QA м•„нӢ°нҢ©нҠё м „мҡ© pushлҠ” CI мҠӨнӮө вҶ’ л¶„ мҶҢм§„ л°©м§Җ
.frontend_validate_changes: &frontend_validate_changes
  rules:
    # QA кё°лЎқ м»Өл°ӢмқҖ ліҙкі м„ң/мҰқкұ° лҸҷкё°нҷ” лӘ©м ҒмқҙлҜҖлЎң н”„лЎ нҠём—”л“ң validateлҘј мғқлһөн•ңлӢӨ.
    - if: '$CI_COMMIT_MESSAGE =~ /^test\(qa\):/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *frontend_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *frontend_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *frontend_validate_paths
      when: on_success
    - when: never

.ai_engine_validate_changes: &ai_engine_validate_changes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *ai_engine_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: *ai_engine_validate_paths
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      changes: *ai_engine_validate_paths
      when: on_success
    - when: never

.main_frontend_changes_only: &main_frontend_changes_only
  rules:
    # QA кё°лЎқ м»Өл°ӢмқҖ н”„лЎңлҚ•м…ҳ л°°нҸ¬ нҠёлҰ¬кұ°м—җм„ң м ңмҷён•ҙ л¶Ҳн•„мҡ”н•ң build/deployлҘј л°©м§Җн•ңлӢӨ.
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /^test\(qa\):/'
      when: never
    # ліҙнҳёлҗҳм§Җ м•ҠмқҖ mainм—җм„ңлҠ” deployлҘј м°ЁлӢЁн•ҙ canonical ліҙнҳё к·ңм№ҷ лҲ„лқҪ мӢң fail-closedлЎң лҸҷмһ‘н•ңлӢӨ.
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
      changes: *frontend_deploy_paths
      when: on_success
    - when: never

.main_ai_engine_changes_only: &main_ai_engine_changes_only
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
      changes:
        - cloud-run/ai-engine/**/*
      when: on_success
    - when: never

.main_ai_engine_smoke_changes_only: &main_ai_engine_smoke_changes_only
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
      changes: *ai_engine_smoke_paths
      when: on_success
    - when: never

.ai_engine_npm_cache: &ai_engine_npm_cache
  cache:
    key:
      files:
        - cloud-run/ai-engine/package-lock.json
    paths:
      - cloud-run/ai-engine/.npm/
    policy: pull-push

.gcp_ci_auth: &gcp_ci_auth
  - |
    if [ -z "${GCP_SERVICE_KEY:-}" ]; then
      echo "вқҢ Missing required GitLab CI variable: GCP_SERVICE_KEY"
      echo "   Add the base64-encoded service account JSON in GitLab вҶ’ Settings вҶ’ CI/CD вҶ’ Variables."
      exit 1
    fi
    if [ -z "${GCP_PROJECT_ID:-}" ]; then
      echo "вқҢ Missing required GitLab CI variable: GCP_PROJECT_ID"
      echo "   Set it to the target GCP project id before running deploy_ai_engine."
      exit 1
    fi
  - printf '%s' "$GCP_SERVICE_KEY" | base64 -d > gcp-key.json
  - test -s gcp-key.json || (echo "вқҢ Decoded gcp-key.json is empty. Verify GCP_SERVICE_KEY is valid base64 JSON." && exit 1)
  - gcloud auth activate-service-account --key-file=gcp-key.json
  - gcloud config set project "$GCP_PROJECT_ID"

# в”Җв”Җв”Җ validate job в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
validate:
  stage: validate
  tags:
    - wsl2-docker  # self-hosted runner м „мҡ© (л¶„ мҶҢм§„ 0). лҜёк°ҖлҸҷ мӢң pending мғҒнғң мң м§Җ.
  <<: [*npm_cache, *frontend_validate_changes]
  before_script:
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "в–¶ TypeScript нғҖмһ… кІҖмӮ¬..."
    - npm run type-check
    - echo "в–¶ Biome lint кІҖмӮ¬..."
    - npm run lint:ci
    - echo "в–¶ л№ лҘё н…ҢмҠӨнҠё мӢӨн–ү..."
    - npm run test:quick
    - echo "в–¶ API/AI лЎңм»¬ кі„м•Ҫ н…ҢмҠӨнҠё мӢӨн–ү..."
    - npm run test:contract
    - echo "вң… validate нҶөкіј"
  timeout: 15 minutes
  interruptible: true

validate_ai_engine:
  stage: validate
  tags:
    - wsl2-docker
  <<: [*ai_engine_npm_cache, *ai_engine_validate_changes]
  before_script:
    - cd cloud-run/ai-engine
    - npm ci --prefer-offline --cache .npm --no-audit
  script:
    - echo "в–¶ AI Engine TypeScript нғҖмһ… кІҖмӮ¬..."
    - npm run type-check
    - echo "в–¶ AI Engine н…ҢмҠӨнҠё мӢӨн–ү..."
    - npm run test
    - echo "вң… AI Engine validate нҶөкіј"
  timeout: 20 minutes
  interruptible: true

# в”Җв”Җв”Җ deploy job в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
deploy:
  stage: deploy
  tags:
    - wsl2-docker  # self-hosted runner (л¶„ мҶҢм§„ 0). лҜёк°ҖлҸҷ мӢң pending мғҒнғң мң м§Җ.
  <<: [*npm_cache_readonly, *main_frontend_changes_only]  # validateк°Җ мһ‘м„ұн•ң .npm/ мәҗмӢң мһ¬мӮ¬мҡ© вҶ’ npm ci мҶҚлҸ„ н–ҘмғҒ
  before_script:
    - npm install -g vercel@50 --no-audit --silent  # лІ„м „ кі м •: 50.x (breaking change л°©м§Җ)
  script:
    - echo "в–¶ Vercel production л°°нҸ¬..."
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
    - echo "вң… л°°нҸ¬ мҷ„лЈҢ"
  environment:
    name: production
    url: https://openmanager-ai.vercel.app
  resource_group: production  # production deploy лҸҷмӢң мӢӨн–ү л°©м§Җ
  timeout: 10 minutes
  # validate м„ұкіө мӢңм—җл§Ң мӢӨн–ү (GitLabмқҙ stage мҲңм„ңлЎң мһҗлҸҷ ліҙмһҘ)

deploy_ai_engine:
  stage: deploy_ai
  tags:
    - wsl2-docker  # self-hosted runner (л¶„ мҶҢм§„ 0). лҜёк°ҖлҸҷ мӢң pending мғҒнғң мң м§Җ.
  <<: *main_ai_engine_changes_only
  # image: google/cloud-sdk:slim  вҶҗ shell executorм—җм„ңлҠ” л¬ҙмӢңлҗЁ. WSL2 мӢңмҠӨн…ң gcloud мӮ¬мҡ© (нҳ„мһ¬ 548.0.0)
  before_script: *gcp_ci_auth
  script:
    - echo "в–¶ AI Engine Cloud Run л°°нҸ¬..."
    - cd cloud-run/ai-engine
    - LOCAL_DOCKER_PREFLIGHT=false CLEANUP_ENABLED=false bash deploy.sh
    - echo "вң… AI Engine л°°нҸ¬ мҷ„лЈҢ"
  after_script:
    - rm -f gcp-key.json
  resource_group: ai-engine-production
  timeout: 15 minutes
  # validate_ai_engine м„ұкіө мӢңм—җл§Ң мӢӨн–ү

post_deploy_ai_engine_smoke:
  stage: smoke
  tags:
    - wsl2-docker  # self-hosted runner (л¶„ мҶҢм§„ 0). лҜёк°ҖлҸҷ мӢң pending мғҒнғң мң м§Җ.
  <<: *main_ai_engine_smoke_changes_only
  # image: google/cloud-sdk:slim  вҶҗ shell executorм—җм„ңлҠ” л¬ҙмӢңлҗЁ. WSL2 мӢңмҠӨн…ң gcloud мӮ¬мҡ©
  needs:
    - job: deploy_ai_engine
      optional: true
  before_script: *gcp_ci_auth
  script:
    - echo "в–¶ AI Engine post-deploy smoke..."
    - bash scripts/ci/ai-engine-post-deploy-smoke.sh
    - echo "вң… AI Engine post-deploy smoke нҶөкіј"
  after_script:
    - rm -f gcp-key.json
  timeout: 5 minutes
  interruptible: true

# в”Җв”Җв”Җ production smoke job в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
post_deploy_smoke:
  stage: smoke
  tags:
    - wsl2-docker  # self-hosted runner (л¶„ мҶҢм§„ 0). лҜёк°ҖлҸҷ мӢң pending мғҒнғң мң м§Җ.
  <<: *main_frontend_changes_only
  needs:
    - deploy
  script:
    - echo "в–¶ Production post-deploy smoke..."
    - npm run test:vercel:post-deploy:smoke -- --url=https://openmanager-ai.vercel.app
    - echo "вң… post-deploy smoke нҶөкіј"
  timeout: 5 minutes
  interruptible: true
