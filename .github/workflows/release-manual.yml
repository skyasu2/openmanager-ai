name: Public Snapshot Sync

# canonical release/deploy authority는 GitLab(main)이다.
# 이 워크플로우는 로컬에서 릴리스 완료 후 GitHub public snapshot을 수동으로
# 동기화하는 보조 트리거 전용이다. 버전 범프나 태그 생성은 수행하지 않는다.
#
# 정상 릴리스 경로:
#   1. 로컬: ./scripts/release/publish.sh patch|minor|major
#   2. GitLab CI: validate → deploy (자동)
#   3. (선택) 로컬: npm run sync:github  또는 이 워크플로우 dispatch
#
# 이 파일은 GitHub public snapshot 전용이며 배포 권위가 없다.

on:
  schedule:
    # Weekly freshness check: Monday 09:00 UTC (18:00 KST)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '실제 반영 없이 동기화 범위만 미리보기'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: public-snapshot-sync
  cancel-in-progress: false

jobs:
  check-freshness:
    name: Release Freshness Check
    if: github.event_name == 'schedule' && vars.ENABLE_ACTIONS_SCHEDULES == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits since last release
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No tags found, skipping freshness check"
            exit 0
          fi

          COMMITS=$(git rev-list --count "${LAST_TAG}..HEAD")
          DAYS=$(( ($(date +%s) - $(git log -1 --format=%ct "$LAST_TAG")) / 86400 ))

          echo "Last release: $LAST_TAG ($DAYS days ago)"
          echo "Commits since: $COMMITS"

          if [ "$COMMITS" -gt 30 ]; then
            echo "::warning::Release may be overdue: $COMMITS commits since $LAST_TAG ($DAYS days ago). Run release locally: ./scripts/release/publish.sh patch"
          else
            echo "Release freshness OK ($COMMITS commits, threshold=30)"
          fi

  sync-public-snapshot:
    name: Sync Public Snapshot to GitHub
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dry-run preview
        if: inputs.dry_run == true
        run: npm run sync:github:dry-run

      - name: Sync public frontend snapshot
        if: inputs.dry_run == false
        run: |
          echo "Syncing public frontend code snapshot to GitHub."
          echo "Canonical release (version bump + deploy) happens via GitLab CI."
          npm run sync:github
