name: GitHub Mirror Guard

# canonical release/deploy authority는 GitLab(main)이다.
# 이 워크플로우는 GitHub mirror 측에서 잘못된 release/sync 기대를 막는 가드다.
# 버전 범프나 태그 생성은 수행하지 않고, canonical GitLab workspace 밖에서는
# public snapshot sync를 지원하지 않는다.
#
# 정상 릴리스 경로:
#   1. 로컬: ./scripts/release/publish.sh patch|minor|major
#   2. GitLab CI: validate → deploy (자동)
#   3. (선택) canonical 로컬 워크스페이스: npm run sync:github
#
# GitHub mirror/workflow에는 canonical private source tree가 없으므로
# 여기서는 안내 메시지만 제공한다.

on:
  workflow_dispatch:
    inputs:
      acknowledge:
        description: '안내 메시지를 확인했습니다'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: github-mirror-guard
  cancel-in-progress: false

jobs:
  sync-public-snapshot:
    name: Explain Supported Public Sync Path
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Explain canonical sync workflow
        run: |
          echo "❌ GitHub Actions cannot produce the canonical public snapshot."
          echo
          echo "Reason:"
          echo "  - canonical source of truth is the private GitLab repo"
          echo "  - this workflow runs from the GitHub mirror checkout only"
          echo "  - npm run sync:github must run from a canonical local workspace"
          echo
          echo "Supported path:"
          echo "  1. local canonical workspace: ./scripts/release/publish.sh patch|minor|major"
          echo "  2. GitLab CI deploys from gitlab/main"
          echo "  3. optional local public refresh: npm run sync:github"
          exit 1
