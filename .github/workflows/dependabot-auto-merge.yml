name: Dependabot Auto-Merge

# 🤖 Dependabot 패치 버전 자동 병합
# - 패치(patch) 업데이트만 자동 병합
# - 마이너/메이저는 수동 승인 필요
# - 기존 open PR도 주기적으로 backfill
#
# 보안 참고:
# - pull_request 경로: dependabot/fetch-metadata outputs 사용
# - schedule/workflow_dispatch 경로: GitHub API로 읽은 PR title만 JS 내부에서 파싱
#   (shell 명령 인자로 전달하지 않음)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # 매일 00:30 KST
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependabot-auto-merge:
    name: 🤖 Auto-Merge Patch Updates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    timeout-minutes: 3

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check update type
        id: check
        env:
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: |
          echo "📦 Package: $DEP_NAMES"
          echo "📊 Update type: $UPDATE_TYPE"
          echo "🔢 New version: $NEW_VERSION"

          if [ "$UPDATE_TYPE" = "version-update:semver-patch" ]; then
            echo "✅ Patch update - eligible for auto-merge"
            echo "should_merge=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ $UPDATE_TYPE - requires manual review"
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge patch updates
        if: steps.check.outputs.should_merge == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          echo "🔀 Enable auto-merge (wait handled by GitHub merge queue/checks): $DEP_NAMES"
          gh pr merge --auto --squash "$PR_URL"

      - name: Ensure manual review label exists
        if: steps.check.outputs.should_merge == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: 'needs-review',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'needs-review',
                color: 'fbca04',
                description: 'Manual review required before merge',
              });
            }

      - name: Add label and comment for manual review
        if: steps.check.outputs.should_merge == 'false'
        uses: actions/github-script@v7
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- dependabot-manual-review -->';
            const body = [
              marker,
              '⚠️ **Manual review required**',
              '',
              `This is a **${process.env.UPDATE_TYPE}** update.`,
              '',
              `- Package: \`${process.env.DEP_NAMES}\``,
              `- Version: \`${process.env.NEW_VERSION}\``,
              '',
              'Please review the changelog before merging.',
            ].join('\n');

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['needs-review'],
            });

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  reconcile-open-dependabot-prs:
    name: 🔁 Reconcile Open Dependabot PRs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Ensure manual review label exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: 'needs-review',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'needs-review',
                color: 'fbca04',
                description: 'Manual review required before merge',
              });
            }

      - name: Backfill open Dependabot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- dependabot-manual-review -->';

            function parseSemver(version) {
              const normalized = String(version || '')
                .trim()
                .replace(/^[^\d]*/, '')
                .split('-')[0];
              const match = normalized.match(/^(\d+)\.(\d+)\.(\d+)/);

              return match ? match.slice(1).map(Number) : null;
            }

            function classifyUpdate(pr) {
              const title = pr.title || '';
              const match = title.match(
                /^chore\(deps(?:-dev)?\): bump (.+) from ([^\s]+) to ([^\s]+)(?: in the .+ group)?$/
              );

              if (!match) {
                return {
                  dependency: 'unknown',
                  fromVersion: 'unknown',
                  toVersion: 'unknown',
                  updateType: 'version-update:unknown',
                };
              }

              const [, dependency, fromVersion, toVersion] = match;
              const from = parseSemver(fromVersion);
              const to = parseSemver(toVersion);

              if (!from || !to) {
                return {
                  dependency,
                  fromVersion,
                  toVersion,
                  updateType: 'version-update:unknown',
                };
              }

              let updateType = 'version-update:unknown';

              if (to[0] > from[0]) {
                updateType = 'version-update:semver-major';
              } else if (to[1] > from[1]) {
                updateType = 'version-update:semver-minor';
              } else if (to[2] > from[2]) {
                updateType = 'version-update:semver-patch';
              }

              return {
                dependency,
                fromVersion,
                toVersion,
                updateType,
              };
            }

            async function clearManualReview(pr) {
              const issue_number = pr.number;

              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: 'needs-review',
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find(
                (comment) =>
                  comment.user?.login === 'github-actions[bot]' &&
                  comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                });
              }
            }

            async function ensureManualReview(pr, metadata) {
              const issue_number = pr.number;
              const body = [
                marker,
                '⚠️ **Manual review required**',
                '',
                `This is a **${metadata.updateType}** update.`,
                '',
                `- Package: \`${metadata.dependency}\``,
                `- Version: \`${metadata.toVersion}\``,
                '',
                'Please review the changelog before merging.',
              ].join('\n');

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['needs-review'],
              });

              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find(
                (comment) =>
                  comment.user?.login === 'github-actions[bot]' &&
                  comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            }

            async function enableAutoMerge(pr) {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                {
                  pullRequestId: pr.node_id,
                }
              );
            }

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const dependabotPRs = pulls.filter((pr) => pr.user?.login === 'dependabot[bot]');
            const results = [];

            for (const pr of dependabotPRs) {
              const metadata = classifyUpdate(pr);

              if (metadata.updateType === 'version-update:semver-patch') {
                try {
                  await enableAutoMerge(pr);
                  await clearManualReview(pr);
                  results.push(`#${pr.number}: auto-merge enabled (${metadata.dependency})`);
                } catch (error) {
                  results.push(
                    `#${pr.number}: auto-merge skipped (${metadata.dependency}) - ${error.message}`
                  );
                }
                continue;
              }

              await ensureManualReview(pr, metadata);
              results.push(`#${pr.number}: marked for manual review (${metadata.dependency})`);
            }

            await core.summary
              .addHeading('Dependabot PR Reconciliation')
              .addList(results.length > 0 ? results : ['No open Dependabot PRs'])
              .write();
