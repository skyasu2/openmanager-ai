name: Dependabot Auto-Merge

# 🤖 Dependabot 패치 버전 자동 병합
# - 패치(patch) 업데이트만 자동 병합
# - 마이너/메이저는 수동 승인 필요
# - CI 통과 필수
#
# 보안 참고: dependabot/fetch-metadata의 outputs만 사용
# (외부 입력인 PR title/body 등 사용하지 않음)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependabot-auto-merge:
    name: 🤖 Auto-Merge Patch Updates
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 3

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check update type
        id: check
        env:
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: |
          echo "📦 Package: $DEP_NAMES"
          echo "📊 Update type: $UPDATE_TYPE"
          echo "🔢 New version: $NEW_VERSION"

          if [ "$UPDATE_TYPE" = "version-update:semver-patch" ]; then
            echo "✅ Patch update - eligible for auto-merge"
            echo "should_merge=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ $UPDATE_TYPE - requires manual review"
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge patch updates
        if: steps.check.outputs.should_merge == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          echo "🔀 Enable auto-merge (wait handled by GitHub merge queue/checks): $DEP_NAMES"
          gh pr merge --auto --squash "$PR_URL"

      - name: Ensure manual review label exists
        if: steps.check.outputs.should_merge == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: 'needs-review',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'needs-review',
                color: 'fbca04',
                description: 'Manual review required before merge',
              });
            }

      - name: Add label and comment for manual review
        if: steps.check.outputs.should_merge == 'false'
        uses: actions/github-script@v7
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- dependabot-manual-review -->';
            const body = [
              marker,
              '⚠️ **Manual review required**',
              '',
              `This is a **${process.env.UPDATE_TYPE}** update.`,
              '',
              `- Package: \`${process.env.DEP_NAMES}\``,
              `- Version: \`${process.env.NEW_VERSION}\``,
              '',
              'Please review the changelog before merging.',
            ].join('\n');

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['needs-review'],
            });

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
