name: CodeQL Analysis

# SAST(Static Application Security Testing) 자동 분석
# - PR/push 시 보안 취약점 감지
# - 주 1회 정기 스캔
# - 스케줄 실행은 리포지토리 변수 ENABLE_ACTIONS_SCHEDULES=true 일 때만 허용

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  schedule:
    - cron: '0 9 * * 1' # 매주 월요일 KST 18:00

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || vars.ENABLE_ACTIONS_SCHEDULES == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
