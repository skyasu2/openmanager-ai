# ==============================================================================
# Cloud Build Configuration (AI Engine)
#
# Features:
# - Artifact Registry (gcr.io deprecated)
# - BuildKit inline cache metadata for config-based builds
# - Docker layer cache hints for faster rebuilds
# - Parallel image pushes where possible
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_IMAGE_TAG=<tag>,_APP_VERSION=<version>,_BUILD_DATE=<iso>,_GIT_SHA=<sha> .
#
# Prerequisites:
#   gcloud artifacts repositories create cloud-run \
#     --repository-format=docker \
#     --location=asia-northeast1 \
#     --description="Cloud Run container images"
#
# v4.0 - 2026-02-02 (Cloud Run ₩0 Cost Optimization)
#   - Added --cpu-throttling (CPU only billed during requests)
#   - Added --no-session-affinity (reduce instance stickiness)
# v3.0 - 2026-02-02 (Cloud Build Free Tier Optimization)
#   - Removed machineType: E2_HIGHCPU_8 (not covered by free tier)
#   - Default Cloud Build pool; official free tier is e2-standard-2 2,500 build-min/month
# v2.0 - 2026-01-08 (Artifact Registry Migration)
# v1.0 - 2026-01-06
# ==============================================================================

options:
  # ⚠️ FREE TIER: Do NOT add machineType here!
  #    Keep the default pool/machine selection to stay within the official free-tier rule.
  #    E2_HIGHCPU_8, N1_HIGHCPU_8 등은 무료 대상 아님.
  # Enable BuildKit for inline cache metadata in manual config-based builds.
  env:
    - 'DOCKER_BUILDKIT=1'
  # Logging to Cloud Logging
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: 'ai-engine'
  _REGION: 'asia-northeast1'
  _REPOSITORY: 'cloud-run'
  _IMAGE_TAG: 'latest'
  _APP_VERSION: '0.0.0'
  _BUILD_DATE: '1970-01-01T00:00:00Z'
  _GIT_SHA: 'manual'

steps:
  # Step 0: Pull the latest image so --cache-from can reuse prior layers.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest" || true

  # Step 1: Build Docker image with BuildKit inline cache metadata
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '--build-arg'
      - 'APP_VERSION=${_APP_VERSION}'
      - '--build-arg'
      - 'BUILD_DATE=${_BUILD_DATE}'
      - '--build-arg'
      - 'GIT_SHA=${_GIT_SHA}'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
    waitFor:
      - 'pull-cache'

  # Step 2: Push images (parallel)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-sha'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}'
    waitFor:
      - 'build'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'
    waitFor:
      - 'build'
# Images to be pushed
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'

# Build timeout
timeout: '900s'

# Tags for the build
tags:
  - 'ai-engine'
  - 'cloud-run'
  - 'multi-agent'
  - 'artifact-registry'
